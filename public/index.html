<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Web Chatbot</h1>
        <p>Ask anything — I search the web in real time.</p>
      </header>

      <section id="chat" class="chat" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <label for="message" class="visually-hidden">Message</label>
        <textarea id="message" rows="2" placeholder="Try: Latest JavaScript features in 2026"></textarea>
        <button type="submit">Send</button>
      </form>
    </main>

    <template id="message-template">
      <article class="message">
        <p class="message__role"></p>
        <pre class="message__content"></pre>
        <ul class="sources"></ul>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
